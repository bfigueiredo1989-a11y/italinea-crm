
<!DOCTYPE html>

<style>

/* SHEETS */
.sheets-hd{background:linear-gradient(135deg,#0F9D58 0%,#34A853 100%);border-radius:12px;padding:16px;color:#fff;margin-bottom:14px}

.map-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}

/* LOGIN */
.lp{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#0E0E0E;padding:20px}
.lb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:32px 24px;width:100%;max-width:340px}
.li{width:100%;padding:9px 12px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box}

/* TOAST */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}.toast-grn{background:var(--grn)}.toast-red{background:var(--red)}.toast-blu{background:var(--blu)}.toast-pur{background:var(--pur)}
</style>

<body>
<div id="root"></div>
<div id="toast" class="toast"></div>
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:600;align-items:flex-end;justify-content:center" onclick="if(event.target===this)fecharModalNativo()"><div id="modal-box" style="background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:92dvh;overflow-y:auto"><div style="width:36px;height:4px;background:#D4D4D8;border-radius:2px;margin:10px auto 0"></div><div id="modal-hd" style="padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #E4E4E7"><span id="modal-title" style="font-size:15px;font-weight:700"></span><button onclick="fecharModalNativo()" style="background:#F0F0F0;border:none;cursor:pointer;padding:4px 10px;border-radius:6px;font-size:13px">✕</button></div><div id="modal-body" style="padding:16px 18px"></div><div id="modal-footer" style="padding:12px 18px;border-top:1px solid #E4E4E7;display:flex;gap:8px"></div></div></div>
<script>
// ─── ESTADO GLOBAL ────────────────────────────────────────────────────────────
const S = {
  users:[
    {id:0,role:"gestor",  nome:"Fábio Costa",       email:"fabio@italinea.com.br", pass:"fabio2025", av:"FC",ativo:true},
    {id:1,role:"distrib", nome:"Júlia Ramos",        email:"julia@italinea.com.br", pass:"julia2025", av:"JR",ativo:true},
    {id:2,role:"vendedor",nome:"João Souza",         email:"joao@italinea.com.br",  pass:"joao2025",  av:"JS",ativo:true},
    {id:3,role:"vendedor",nome:"Jorge Lima",         email:"jorge@italinea.com.br", pass:"jorge2025", av:"JL",ativo:true},
    {id:4,role:"agencia", nome:"Bruno (Anthropic)",  email:"bruno@anthropic.com",   pass:"bruno2025", av:"BR",ativo:true},
  ],
  user:null, screen:"dash", leads:[], sel:null, modal:null, sideOpen:false,
  detailTab:"info", relTab:"mensal", distribFiltro:"pendentes",
  leadFiltro:{q:"",prio:"",status:""},
  showNotif:true,
  nextUserId:5,
  metaMensal:0, // Meta da LOJA (total). Dividida automaticamente por nº de vendedores
  // Google Sheets
  sheetsUrl:"",
  sheetsMapeamento:{nome:"Nome",telefone:"Telefone",email:"Email",origem:"Origem",interesse:"Interesse",orc:"Orçamento",prazo:"Prazo"},
  lastImport:null,
  importLog:[],
};

const MESES      = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const MESES_FULL = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const STATUS_L   = ["Novo lead","Contato pendente","Em atendimento","Sem resposta","Lead qualificado","Visita agendada","Orçamento enviado","Negociação","Venda fechada","Venda perdida","Nutrição futura"];
const MOTIVOS    = ["Sem resposta","Preço alto","Orçamento insuficiente","Comprou com concorrente","Sem imóvel próprio","Prazo longo","Sem interesse real","Atendimento demorou","Cliente desistiu","Outro motivo"];
const INTERESSES = ["Cozinha","Quarto","Sala","Escritório","Casa completa","Closet","Banheiro","Área de serviço"];
const ORIGENS    = ["Instagram","Facebook","Google","Indicação","Site"];
const CANAIS     = ["WhatsApp","Ligação","E-mail","Reunião","Visita"];
const KB_COLS    = [
  {s:"Novo lead",          l:"Novo Lead",      c:"#2563EB"},
  {s:"Contato pendente",   l:"Pendente",       c:"#7C3AED"},
  {s:"Em atendimento",     l:"Em Atendimento", c:"#D97706"},
  {s:"Visita agendada",    l:"Visita",         c:"#F59E0B"},
  {s:"Orçamento enviado",  l:"Orçamento",      c:"#8B5CF6"},
  {s:"Negociação",         l:"Negociação",     c:"#EA580C"},
  {s:"Venda fechada",      l:"✅ Fechado",     c:"#16A34A"},
  {s:"Venda perdida",      l:"❌ Perdido",     c:"#C41E3A"},
];

// ─── PERSISTÊNCIA localStorage ───────────────────────────────────────────────
const STORAGE_KEY = "italinea_crm_v1";

function salvarDados() {
  try {
    const dados = {
      leads: S.leads,
      users: S.users,
      nextUserId: S.nextUserId,
      metaMensal: S.metaMensal,
      sheetsUrl: S.sheetsUrl,
      sheetsMapeamento: S.sheetsMapeamento,
      importLog: S.importLog,
      lastImport: S.lastImport,
      salvoEm: new Date().toISOString()
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
  } catch(e) { console.warn("Erro ao salvar:", e); }
}

function carregarDados() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const dados = JSON.parse(raw);
    if (dados.leads)           S.leads         = dados.leads.map(prep);
    if (dados.users)           S.users         = dados.users;
    if (dados.nextUserId)      S.nextUserId    = dados.nextUserId;
    if (dados.metaMensal!=null) S.metaMensal   = dados.metaMensal;
    if (dados.sheetsUrl)       S.sheetsUrl     = dados.sheetsUrl;
    if (dados.sheetsMapeamento) S.sheetsMapeamento = dados.sheetsMapeamento;
    if (dados.importLog)       S.importLog     = dados.importLog;
    if (dados.lastImport)      S.lastImport    = dados.lastImport;
    return true;
  } catch(e) { console.warn("Erro ao carregar:", e); return false; }
}

window.exportarBackup = function() {
  const dados = {
    versao: "italinea-crm-v1",
    exportadoEm: new Date().toLocaleString("pt-BR"),
    leads: S.leads,
    users: S.users,
    nextUserId: S.nextUserId,
    sheetsUrl: S.sheetsUrl,
    sheetsMapeamento: S.sheetsMapeamento,
    importLog: S.importLog
  };
  const blob = new Blob([JSON.stringify(dados, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const data = new Date().toLocaleDateString("pt-BR").replace(/\//g,"-");
  a.href = url; a.download = `italinea-backup-${data}.json`; a.click();
  URL.revokeObjectURL(url);
  toast("✅ Backup exportado!", "grn");
};

window.importarBackup = function() {
  const input = document.createElement("input");
  input.type = "file"; input.accept = ".json";
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const dados = JSON.parse(ev.target.result);
        if (!dados.versao || dados.versao !== "italinea-crm-v1")
          return alert("Arquivo inválido. Use apenas backups exportados por este sistema.");
        if (!confirm(`Restaurar backup de ${dados.exportadoEm}?\n\nIsso substituirá TODOS os dados atuais.`)) return;
        if (dados.leads)           S.leads         = dados.leads.map(prep);
        if (dados.users)           S.users         = dados.users;
        if (dados.nextUserId)      S.nextUserId    = dados.nextUserId;
        if (dados.sheetsUrl)       S.sheetsUrl     = dados.sheetsUrl;
        if (dados.sheetsMapeamento) S.sheetsMapeamento = dados.sheetsMapeamento;
        if (dados.importLog)       S.importLog     = dados.importLog;
        salvarDados();
        toast("✅ Backup restaurado com sucesso!", "grn");
        render();
      } catch(err) { alert("Erro ao ler o arquivo: " + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
};

const today = () => new Date().toISOString().split("T")[0];
const fmtD  = d => d?new Date(d+"T12:00:00").toLocaleDateString("pt-BR"):"—";
const fmtM  = v => (v!=null&&v!=="")?"R$ "+Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2}):"—";

function toast(msg,tipo="grn"){
  const el=document.getElementById("toast");
  if(!el)return;
  el.textContent=msg; el.className=`toast toast-${tipo} show`;
  setTimeout(()=>el.className="toast",3000);
}

function calcScore(l){
  let s=0;
  if(l.prazo==="Imediato")s+=30; else if(l.prazo==="Até 3 meses")s+=20;
  if(l.imovel==="Sim")s+=25;
  const o=parseFloat((l.orc||"").replace(/\D/g,""))||0;
  if(o>=50000)s+=25; else if(o>=30000)s+=15;
  if(l.interesse==="Casa completa")s+=20; else if(l.interesse==="Cozinha")s+=15;
  if(l.respondeu)s+=10; if(l.visitou)s+=30;
  return Math.min(s,100);
}
function calcPrio(l){
  const o=parseFloat((l.orc||"").replace(/\D/g,""))||0;
  if(l.prazo==="Imediato"||o>=30000||(l.prazo==="Até 3 meses"&&l.imovel==="Sim"))return 1;
  if(l.prazo==="Até 3 meses")return 2; if(l.prazo==="Até 6 meses")return 3; return 4;
}
function prep(l){const sc=calcScore(l);return{...l,score:sc,prio:calcPrio(l),temp:sc>=70?"Quente":sc>=40?"Morno":"Frio"};}

    if(p1.length>0)   grupos.push({t:"🚨 P1 Sem Nenhum Contato",cor:"#C41E3A",leads:p1,desc:"Leads de alta prioridade sem atendimento ainda."});
    if(atr.length>0)  grupos.push({t:"⚠️ Follow-ups Atrasados (Equipe)",cor:"#D97706",leads:atr,desc:"Toda a equipe."});
    if(hj.length>0)   grupos.push({t:"📅 Follow-ups de Hoje (Equipe)",cor:"#2563EB",leads:hj,desc:"Contatos agendados para hoje."});
  }

  const total=grupos.reduce((a,g)=>a+g.leads.length,0);

  if(grupos.length===0)return`<div style="text-align:center;padding:60px 20px;color:#A1A1AA">
    <div style="font-size:48px;margin-bottom:12px">✅</div>
    <div style="font-size:18px;font-weight:600;color:#18181B;margin-bottom:6px">Tudo em dia!</div>
    <div>Nenhum alerta para hoje. Ótimo trabalho!</div>
  </div>`;

  return`<div>
  <div style="margin-bottom:16px">
    <div style="font-size:16px;font-weight:700">${total} alerta${total!==1?"s":""} para hoje</div>
    <div style="font-size:12px;color:#A1A1AA">${new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
  </div>
  ${grupos.map(g=>`<div style="margin-bottom:22px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div style="width:4px;height:22px;border-radius:2px;background:${g.cor};flex-shrink:0"></div>
      <div><div style="font-size:14px;font-weight:700">${g.t} <span style="background:${g.cor}22;color:${g.cor};font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px">${g.leads.length}</span></div>
      <div style="font-size:11px;color:#A1A1AA;margin-top:2px">${g.desc}</div></div>
    </div>
    ${g.leads.map(l=>{const v=S.users.find(x=>x.id===l.vid);return`<div class="card" style="padding:12px 14px;margin-bottom:8px;cursor:pointer;border-left:3px solid ${g.cor}" onclick="openLead(${l.id})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div><div style="font-weight:600;font-size:13px">${l.nome}</div><div style="font-size:11px;color:#A1A1AA">${l.tel}</div></div>${prioBdg(l.prio)}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px">${stsBdg(l.status)} ${tempBdg(l.temp)}
        ${v?`<span class="badge b-blu">👤 ${v.nome}</span>`:""}</div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#A1A1AA">
        <span>${l.interesse} · ${l.orc}</span>
        ${l.follow?`<span style="color:${l.follow<today()?"var(--red)":"var(--amb)"}">📅 ${fmtD(l.follow)}</span>`:""}
      </div>
    </div>`;}).join("")}
  </div>`).join("")}
  </div>`;
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function buildDash(ml){
  const role=S.user.role;
  const fech=ml.filter(l=>l.status==="Venda fechada");
  const p1=ml.filter(l=>l.prio===1&&!["Venda fechada","Venda perdida"].includes(l.status));
  const atr=ml.filter(l=>l.follow&&l.follow<today()&&!["Venda fechada","Venda perdida"].includes(l.status));
  const val=fech.reduce((a,l)=>a+(parseFloat(l.valorVenda)||0),0);
  const conv=ml.length>0?((fech.length/ml.length)*100).toFixed(0):0;
  const pend=S.leads.filter(l=>l.vid===null);

  let h=buildNotifBanner();

  h+=`<div class="metrics">
    <div class="mc"><div class="mc-bar" style="background:#2563EB"></div><div class="ml">Leads</div><div class="mv" style="color:#2563EB">${ml.length}</div></div>
    ${podeVerTudo()?`<div class="mc"><div class="mc-bar" style="background:#7C3AED"></div><div class="ml">Aguard. Distrib.</div><div class="mv" style="color:#7C3AED">${pend.length}</div></div>`:""}
    <div class="mc"><div class="mc-bar" style="background:#C41E3A"></div><div class="ml">P1 Urgentes</div><div class="mv" style="color:#C41E3A">${p1.length}</div></div>
    <div class="mc"><div class="mc-bar" style="background:#D97706"></div><div class="ml">Follow-up Atr.</div><div class="mv" style="color:#D97706">${atr.length}</div></div>
    <div class="mc"><div class="mc-bar" style="background:#16A34A"></div><div class="ml">Vendas</div><div class="mv" style="color:#16A34A">${fech.length}</div></div>
    <div class="mc"><div class="mc-bar" style="background:#16A34A"></div><div class="ml">Valor Vendido</div><div class="mv" style="color:#16A34A;font-size:${val>=100000?14:17}px">${val>0?fmtM(val):"—"}</div></div>
    <div class="mc"><div class="mc-bar" style="background:#16A34A"></div><div class="ml">Conversão</div><div class="mv" style="color:#16A34A">${conv}%</div></div>
  </div>`;

  // ── BLOCO DE METAS ──────────────────────────────────────────────────────────
  const mesAtual  = new Date().getMonth();
  const anoAtual  = new Date().getFullYear();
  const nomeMes   = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][mesAtual];
  const metaLoja  = S.metaMensal || 0;           // meta total da loja
  const numVends  = vendedoresAtivos().length || 1;
  const metaVend  = metaLoja > 0 ? Math.round(metaLoja / numVends) : 0; // dividido igualmente

  // Vendas do mês atual (toda a loja)
  const vendasMes = S.leads.filter(l => {
    if(l.status !== "Venda fechada" || !l.dataFechamento) return false;
    const d = new Date(l.dataFechamento + "T12:00:00");
    return d.getMonth() === mesAtual && d.getFullYear() === anoAtual;
  });
  const valorMes  = vendasMes.reduce((a,l) => a + (parseFloat(l.valorVenda)||0), 0);
  const pctLoja   = metaLoja > 0 ? Math.min(Math.round((valorMes/metaLoja)*100),100) : 0;
  const corLoja   = pctLoja >= 100 ? "#16A34A" : pctLoja >= 70 ? "#D97706" : "#C41E3A";

  // Ticket médio das vendas do mês (ou geral se não houver no mês)
  const todasFech = S.leads.filter(l => l.status==="Venda fechada" && l.valorVenda);
  const ticketMedio = vendasMes.length > 0
    ? valorMes / vendasMes.length
    : todasFech.length > 0
      ? todasFech.reduce((a,l)=>a+(parseFloat(l.valorVenda)||0),0) / todasFech.length
      : 0;

  // Projeção: quantas vendas faltam para bater a meta da loja
  const faltaLoja   = Math.max(metaLoja - valorMes, 0);
  const vendasFalta = ticketMedio > 0 ? Math.ceil(faltaLoja / ticketMedio) : 0;

  // Dados por vendedor
  const dadosVend = vendedoresAtivos().map(v => {
    const vMes = S.leads.filter(l => {
      if(l.vid !== v.id || l.status !== "Venda fechada" || !l.dataFechamento) return false;
      const d = new Date(l.dataFechamento + "T12:00:00");
      return d.getMonth() === mesAtual && d.getFullYear() === anoAtual;
    });
    const vlMes  = vMes.reduce((a,l) => a+(parseFloat(l.valorVenda)||0), 0);
    const pctV   = metaVend > 0 ? Math.min(Math.round((vlMes/metaVend)*100),100) : 0;
    const corV   = pctV >= 100 ? "#16A34A" : pctV >= 70 ? "#D97706" : "#C41E3A";
    const faltaV = Math.max(metaVend - vlMes, 0);
    const vendasFaltaV = ticketMedio > 0 ? Math.ceil(faltaV / ticketMedio) : 0;
    return {v, vMes, vlMes, pctV, corV, faltaV, vendasFaltaV};
  });

  h += `<div class="card" style="margin-bottom:14px;overflow:hidden">
    <!-- Header da meta -->
    <div style="background:linear-gradient(135deg,#111 0%,#1e1e1e 100%);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.4)">🎯 Metas — ${nomeMes}</div>
        ${podeGerenciar() ? `<button onclick="abrirModalMeta()" style="margin-top:4px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);padding:3px 10px;border-radius:6px;font-size:11px;cursor:pointer">✏️ Definir meta</button>` : ""}
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:rgba(255,255,255,.35)">Meta por vendedor</div>
        <div style="font-size:18px;font-weight:700;font-family:Georgia,serif;color:#fff">${metaVend > 0 ? fmtM(metaVend) : "—"}</div>
      </div>
    </div>

    <!-- META DA LOJA -->
    <div style="padding:14px 16px;border-bottom:1px solid #F4F4F5">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#A1A1AA;margin-bottom:2px">🏪 Meta da Loja</div>
          <div style="font-size:20px;font-weight:700;font-family:Georgia,serif;color:${corLoja}">${fmtM(valorMes)}</div>
          <div style="font-size:11px;color:#A1A1AA">de ${metaLoja > 0 ? fmtM(metaLoja) : "Meta não definida"} · ${vendasMes.length} venda${vendasMes.length!==1?"s":""}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:32px;font-weight:700;color:${corLoja};line-height:1">${metaLoja > 0 ? pctLoja+"%" : "—"}</div>
          ${metaLoja > 0 && pctLoja < 100 ? `<div style="font-size:11px;color:#A1A1AA">faltam ${fmtM(faltaLoja)}</div>` : ""}
        </div>
      </div>
      <div style="height:10px;background:#F0F0F0;border-radius:5px;overflow:hidden;margin-bottom:6px">
        <div style="height:100%;width:${pctLoja}%;background:${corLoja};border-radius:5px"></div>
      </div>
      ${pctLoja >= 100
        ? `<div style="font-size:12px;font-weight:600;color:#16A34A">🎉 Meta da loja atingida! Incrível!</div>`
        : metaLoja > 0 && ticketMedio > 0 && vendasFalta > 0
          ? `<div style="font-size:12px;color:#52525B">💡 Ticket médio: <strong>${fmtM(ticketMedio)}</strong> · Faça mais <strong style="color:${corLoja}">${vendasFalta} venda${vendasFalta!==1?"s":""}</strong> para bater a meta</div>`
          : metaLoja > 0 ? `<div style="font-size:12px;color:#A1A1AA">Defina vendas para ver a projeção</div>` : ""}
    </div>

    <!-- META POR VENDEDOR -->
    <div style="padding:10px 16px 4px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#A1A1AA;margin-bottom:10px">👤 Meta por Vendedor</div>
    </div>
    ${dadosVend.map((d,i) => `
    <div style="padding:10px 16px;border-bottom:${i<dadosVend.length-1?"1px solid #F4F4F5":"none"}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <div style="width:30px;height:30px;border-radius:50%;background:${d.corV};color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${d.v.av}</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px">${d.v.nome}</div>
          <div style="font-size:11px;color:#A1A1AA">${fmtM(d.vlMes)} de ${metaVend > 0 ? fmtM(metaVend) : "—"} · ${d.vMes.length} venda${d.vMes.length!==1?"s":""}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:20px;font-weight:700;color:${d.corV}">${metaVend > 0 ? d.pctV+"%" : "—"}</div>
          ${metaVend > 0 && d.pctV < 100 ? `<div style="font-size:10px;color:#A1A1AA">faltam ${fmtM(d.faltaV)}</div>` : ""}
        </div>
      </div>
      <div style="height:8px;background:#F0F0F0;border-radius:4px;overflow:hidden;margin-bottom:4px">
        <div style="height:100%;width:${d.pctV}%;background:${d.corV};border-radius:4px"></div>
      </div>
      ${d.pctV >= 100
        ? `<div style="font-size:11px;font-weight:600;color:#16A34A">🎉 Meta atingida!</div>`
        : metaVend > 0 && ticketMedio > 0 && d.vendasFaltaV > 0
          ? `<div style="font-size:11px;color:#52525B">💡 Faça mais <strong style="color:${d.corV}">${d.vendasFaltaV} venda${d.vendasFaltaV!==1?"s":""}</strong> com ticket médio de ${fmtM(ticketMedio)} para bater</div>`
          : ""}
    </div>`).join("")}

    ${dadosVend.length === 0 ? `<div style="padding:16px;text-align:center;color:#A1A1AA;font-size:12px">Nenhum vendedor ativo</div>` : ""}
  </div>`;

  if(podeVerTudo()&&role!=="agencia"){
    const maxC=Math.max(...vendedoresAtivos().map(v=>calcCarga(v.id)),1);
    h+=`<div class="card">
    <div style="padding:12px 14px 4px"><span class="sec-title">Carga dos Vendedores (ativos)</span></div>
    ${vendedoresAtivos().map((v,i,arr)=>{
      const vl=S.leads.filter(l=>l.vid===v.id);
      const vf=vl.filter(l=>l.status==="Venda fechada");
      const tv=vf.reduce((a,l)=>a+(parseFloat(l.valorVenda)||0),0);
      const t=vl.length>0?((vf.length/vl.length)*100).toFixed(0):0;
      const carga=calcCarga(v.id);
      return`<div style="padding:10px 14px;border-bottom:${i<arr.length-1?"1px solid #F4F4F5":"none"}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${v.av}</div>
          <div style="flex:1"><div style="font-weight:600;font-size:13px">${v.nome}</div>
          <div style="font-size:11px;color:#A1A1AA">${carga} ativo${carga!==1?"s":""} · ${vf.length} venda${vf.length!==1?"s":""}${tv>0?" · "+fmtM(tv):""}</div></div>
          <span class="badge" style="background:${cargaCor(carga)}22;color:${cargaCor(carga)};font-weight:700">${cargaLabel(carga)}</span>
          <span class="badge b-grn">${t}%</span>
        </div>
        <div class="vload"><div class="vload-f" style="width:${Math.round((carga/maxC)*100)}%;background:${cargaCor(carga)}"></div></div>
      </div>`;
    }).join("")}
    </div>`;
  }
  return h;
}

// ─── LEADS ────────────────────────────────────────────────────────────────────
function buildLeads(ml){
  const q=S.leadFiltro.q, fP=S.leadFiltro.prio, fS=S.leadFiltro.status;
  const fil=ml.filter(l=>{
    if(q&&!l.nome.toLowerCase().includes(q.toLowerCase()))return false;
    if(fP&&l.prio!==parseInt(fP))return false;
    if(fS&&l.status!==fS)return false;
    return true;
  }).sort((a,b)=>a.prio-b.prio);

  return`<div>
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
    <input placeholder="🔍 Buscar..." value="${q}" oninput="S.leadFiltro.q=this.value;rerenderContent()" style="flex:1;min-width:140px;padding:8px 11px;border:1.5px solid var(--bdr);border-radius:8px;font-size:13px;font-family:inherit">
    <select class="fc" style="width:auto;font-size:12px" onchange="S.leadFiltro.prio=this.value;rerenderContent()">
      <option value="">Prio.</option>${["1","2","3","4"].map(p=>`<option value="${p}" ${fP===p?"selected":""}>P${p}</option>`).join("")}
    </select>
    <select class="fc" style="width:auto;font-size:12px;max-width:130px" onchange="S.leadFiltro.status=this.value;rerenderContent()">
      <option value="">Status</option>${STATUS_L.map(s=>`<option value="${s}" ${fS===s?"selected":""}>${s}</option>`).join("")}
    </select>
    ${podeGerenciar()?`<button class="btn btn-red" onclick="openModal('addlead')">+ Lead</button>`:""}
  </div>
  <div style="font-size:11px;color:#A1A1AA;margin-bottom:10px">${fil.length} lead${fil.length!==1?"s":""}</div>
  ${fil.map(l=>{
    const v=S.users.find(x=>x.id===l.vid);
    const atr=l.follow&&l.follow<today();
    return`<div class="card lcard" onclick="openLead(${l.id})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div><div style="font-weight:700;font-size:14px">${l.nome}</div><div style="font-size:11px;color:#A1A1AA;margin-top:1px">${l.tel}</div></div>${prioBdg(l.prio)}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">${stsBdg(l.status)} ${tempBdg(l.temp)}
        ${l.vid?`<span class="badge b-blu">👤 ${v?.nome||""}</span>`:podeVerTudo()?`<span class="badge b-pur">⏳ Não distribuído</span>`:""}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
        <span style="font-size:12px;color:#52525B">${l.interesse} · ${l.orc}</span>
        ${l.follow?`<span style="font-size:11px;color:${atr?"#C41E3A":"#A1A1AA"};font-weight:${atr?600:400}">${atr?"⚠️ ":"📅 "}${fmtD(l.follow)}</span>`:""}
      </div>
      ${l.status==="Venda fechada"&&l.valorVenda?`<div style="margin-top:6px;font-size:12.5px;font-weight:700;color:#16A34A">💰 ${fmtM(l.valorVenda)}</div>`:""}
    </div>`;
  }).join("")}
  ${fil.length===0?`<div style="text-align:center;padding:40px;color:#A1A1AA"><div style="font-size:32px">🔍</div><div style="margin-top:8px">Nenhum lead</div></div>`:""}
  </div>`;
}

// ─── DISTRIBUIÇÃO ─────────────────────────────────────────────────────────────
function buildDistribuicao(){
  const filtro=S.distribFiltro||"pendentes";
  const todos=S.leads, pend=todos.filter(l=>l.vid===null), dist=todos.filter(l=>l.vid!==null);
  const lista=filtro==="pendentes"?pend:filtro==="distribuidos"?dist:todos;
  const cargas=vendedoresAtivos().map(v=>({...v,carga:calcCarga(v.id),total:S.leads.filter(l=>l.vid===v.id&&l.distribuidoPor!=null).length}));
  const maxC=Math.max(...cargas.map(c=>c.carga),1);

  let h="";
  if(podeDistribuir()&&pend.length>0)
    h+=`<div class="alert al-pur">🤖 <div><strong>Rodízio Justo Automático:</strong> O sistema sugere o vendedor com menos leads ativos. Você pode aceitar ou escolher outro.</div></div>`;

  h+=`<div class="card" style="padding:14px;margin-bottom:14px">
    <div class="sec-title">Carga Atual dos Vendedores</div>
    ${cargas.map(c=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div style="width:26px;height:26px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${c.av}</div>
      <div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:13px;font-weight:600">${c.nome}</span>
        <span style="font-size:11px;color:${cargaCor(c.carga)};font-weight:600">${c.carga} ativo${c.carga!==1?"s":""} — ${cargaLabel(c.carga)}</span>
      </div>
      <div class="vload"><div class="vload-f" style="width:${Math.round((c.carga/maxC)*100)}%;background:${cargaCor(c.carga)}"></div></div></div>
    </div>`).join("")}
  </div>
  <div class="g3"><div class="mc"><div class="mc-bar" style="background:#7C3AED"></div><div class="ml">Aguardando</div><div class="mv" style="color:#7C3AED">${pend.length}</div></div>
  <div class="mc"><div class="mc-bar" style="background:#16A34A"></div><div class="ml">Distribuídos</div><div class="mv" style="color:#16A34A">${dist.length}</div></div>
  <div class="mc"><div class="mc-bar" style="background:#2563EB"></div><div class="ml">Total</div><div class="mv" style="color:#2563EB">${todos.length}</div></div></div>
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <button class="btn ${filtro==="pendentes"?"btn-pur":""}" style="${filtro==="pendentes"?"":"background:#F3E8FF;color:#7C3AED"}" onclick="S.distribFiltro='pendentes';rerenderContent()">⏳ Aguardando (${pend.length})</button>
    <button class="btn ${filtro==="distribuidos"?"btn-grn":""}" onclick="S.distribFiltro='distribuidos';rerenderContent()">✅ Distribuídos (${dist.length})</button>
    <button class="btn ${filtro==="todos"?"btn-blu":""}" onclick="S.distribFiltro='todos';rerenderContent()">Todos (${todos.length})</button>
  </div>`;

  if(lista.length===0){h+=`<div style="text-align:center;padding:40px;color:#A1A1AA"><div style="font-size:36px">${filtro==="pendentes"?"🎉":"📭"}</div><div style="margin-top:8px">${filtro==="pendentes"?"Todos distribuídos!":"Nenhum lead"}</div></div>`;return h;}

  h+=lista.map(l=>{
    const distr=l.vid!==null, vend=S.users.find(u=>u.id===l.vid), distUser=S.users.find(u=>u.id===l.distribuidoPor);

// ─── AGENDA ───────────────────────────────────────────────────────────────────
function buildAgenda(ml){
  const ativos=ml.filter(l=>!["Venda fechada","Venda perdida"].includes(l.status));
  const atr=ativos.filter(l=>l.follow&&l.follow<today());
  const hj=ativos.filter(l=>l.follow===today());
  const sem=ativos.filter(l=>{if(!l.follow)return false;const d=(new Date(l.follow+"T12:00:00")-new Date())/86400000;return d>0&&d<=7;});

  function etapaLabel(l){
    const map={"Novo lead":"📥 Novo","Sem resposta":"📵 Sem resposta","Contato pendente":"📞 Aguardando","Em atendimento":"🔍 Qualificação","Lead qualificado":"🏠 Visita","Visita agendada":"📋 Orçamento","Orçamento enviado":"🤝 Negociação","Negociação":"🤝 Negociação"};
    return map[l.status]||l.status;
  }

  function cardAgenda(l, corBorda){
    const v=S.users.find(x=>x.id===l.vid);
    const atraso=l.follow&&l.follow<today();
    const temp=l.temp||"Frio";
    const tempCor=temp==="Quente"?"#C41E3A":temp==="Morno"?"#D97706":"#2563EB";
    const tempIco=temp==="Quente"?"🔥":temp==="Morno"?"🌤":"❄️";
    return `<div class="card" style="padding:14px;margin-bottom:10px;border-left:4px solid ${corBorda};cursor:pointer" onclick="openLead(${l.id})">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.nome}</div>
          <div style="font-size:11px;color:#A1A1AA;margin-top:2px">${l.interesse} · ${l.orc}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <span style="background:${tempCor}22;color:${tempCor};font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px">${tempIco} ${temp}</span>
          ${prioBdg(l.prio)}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        <span style="background:#F0F0F0;color:#52525B;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px">${etapaLabel(l)}</span>
        ${v?`<span style="font-size:11px;color:#A1A1AA">👤 ${v.nome}</span>`:""}
      </div>
      ${l.followAssunto?`<div style="background:#FEF9C3;border-radius:8px;padding:8px 10px;margin-bottom:8px">
        <div style="font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;margin-bottom:2px">📌 O que abordar</div>
        <div style="font-size:12px;color:#78350F">${l.followAssunto}</div>
      </div>`:""}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:12px;font-weight:600;color:${atraso?"#C41E3A":"#D97706"}">${atraso?"⚠️ Atrasado — ":"📅 "}${fmtD(l.follow)}</span>
        <span style="font-size:11px;color:#A1A1AA">${l.tentativas} contato${l.tentativas!==1?"s":""}</span>
      </div>
    </div>`;
  }

  function sec(title,items,cor){
    if(items.length===0)return"";
    return`<div style="margin-bottom:20px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:${cor};margin-bottom:10px">${title} (${items.length})</div>
      ${items.map(l=>cardAgenda(l,cor)).join("")}
    </div>`;
  }

  const total=atr.length+hj.length+sem.length;
  return`<div>
  <div class="metrics" style="margin-bottom:16px">
    <div class="mc"><div class="mc-bar" style="background:#C41E3A"></div><div class="ml">Atrasados</div><div class="mv" style="color:#C41E3A">${atr.length}</div></div>
    <div class="mc"><div class="mc-bar" style="background:#D97706"></div><div class="ml">Hoje</div><div class="mv" style="color:#D97706">${hj.length}</div></div>
    <div class="mc"><div class="mc-bar" style="background:#2563EB"></div><div class="ml">Esta Semana</div><div class="mv" style="color:#2563EB">${sem.length}</div></div>
  </div>
  ${total===0?`<div style="text-align:center;padding:60px 20px;color:#A1A1AA">
    <div style="font-size:48px;margin-bottom:12px">✅</div>
    <div style="font-size:16px;font-weight:600;color:#18181B;margin-bottom:6px">Agenda limpa!</div>
    <div style="font-size:13px">Nenhum follow-up pendente. Bom trabalho!</div>
  </div>`:""}
  ${sec("⚠️ Atrasados — contate agora!",atr,"#C41E3A")}
  ${sec("📅 Hoje",hj,"#D97706")}
  ${sec("📆 Esta Semana",sem,"#2563EB")}
  </div>`;
}

window.abrirModalObsEtapa = function(key, nomeEtapa, leadId) {
  const l = S.leads.find(x => x.id === leadId);
  if(!l) return;
  const obsAtual = l.obsEtapa?.[key] || "";
  abrirModalNativo(
    `📝 Observação — ${nomeEtapa}`,
    `<div class="fg">
       <label class="fl">O que aconteceu nesta etapa?</label>
       <textarea class="fc" id="obs-etapa-txt" style="min-height:100px" placeholder="Ex: Cliente pediu desconto, ficou de dar retorno...">${obsAtual.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</textarea>
     </div>`,
    `<button onclick="fecharModalNativo()" style="flex:1;padding:10px;border-radius:8px;border:none;background:#F0F0F0;cursor:pointer;font-size:13px">Cancelar</button>
     <button onclick="salvarObsEtapa('${key}',${leadId})" style="flex:1;padding:10px;border-radius:8px;border:none;background:#C41E3A;color:#fff;cursor:pointer;font-size:13px;font-weight:600">💾 Salvar</button>`
  );
};

window.salvarObsEtapa = function(key, leadId) {
  const txt = document.getElementById('obs-etapa-txt');
  if(!txt) return;
  const l = S.leads.find(x => x.id === leadId);
  if(!l) return;
  const obsEtapa = {...(l.obsEtapa||{}), [key]: txt.value};
  const upd = {...l, obsEtapa};
  S.leads = S.leads.map(x => x.id === leadId ? upd : x);
  if(S.sel?.id === leadId) S.sel = upd;
  fecharModalNativo();
  salvarDados();
  toast("✅ Observação da etapa salva", "grn");
  rerenderContent();
};


window.selResp = function(v) {
  const inp = document.getElementById('m-respondeu');
  const bs = document.getElementById('btn-sim');
  const bn = document.getElementById('btn-nao');
  if(!inp||!bs||!bn) return;
  inp.value = v;
  if(v==='sim'){

    bs.style.background='#fff'; bs.style.color='#333'; bs.style.borderColor='#E4E4E7';
  }
};

function gerarLinkWhatsApp(l) {

      ${podEdit?`<button class="btn btn-red" style="font-size:11px;padding:6px 10px" onclick="openModal('histo')">+ Registrar</button>`:""}
    </div>
    ${hist.length===0?`<div style="text-align:center;padding:40px;color:#A1A1AA"><div style="font-size:32px">📭</div><div style="margin-top:8px">Sem contatos</div></div>`:
    hist.map(h=>`<div class="card" style="padding:11px 13px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:600;color:#52525B">📞 ${h.tipo} · ${h.vendedor}</span><span style="font-size:10px;color:#A1A1AA">${h.data}</span></div>
      <div style="font-size:12.5px;color:#52525B"><strong>Resultado:</strong> ${h.resultado}</div>
      ${h.obs?`<div style="font-size:12.5px;color:#A1A1AA;margin-top:3px">${h.obs}</div>`:""}
    </div>`).join("")}`;
  } else if(tab==="followup"){
    const temContato = (l.tentativas||0) > 0 || (l.hist||[]).length > 0;
    if(!temContato && podEdit){
      tabContent=`<div style="text-align:center;padding:40px 20px;color:#A1A1AA">
        <div style="font-size:42px;margin-bottom:12px">📞</div>
        <div style="font-size:15px;font-weight:700;color:#18181B;margin-bottom:8px">Faça o primeiro contato</div>
        <div style="font-size:13px;margin-bottom:20px">O follow-up fica disponível após o primeiro contato registrado com o cliente.</div>
        <button class="btn btn-red" onclick="openModal('histo')">📋 Registrar 1º Contato</button>
      </div>`;
    } else {
      tabContent=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span class="sec-title">Follow-up</span>
        ${podEdit?`<button class="btn btn-red" style="font-size:11px;padding:6px 10px" onclick="openModal('follow')">+ Agendar</button>`:""}
      </div>
      ${l.follow?`<div class="card" style="padding:16px">
          <div class="sec-title">Próximo Follow-up</div>
          <div style="font-family:Georgia,serif;font-size:28px;font-weight:700;color:${atr?"#C41E3A":"#18181B"};margin-bottom:8px">${fmtD(l.follow)}</div>
          ${atr?`<span class="badge b-red" style="margin-bottom:14px;display:inline-flex">⚠️ Atrasado — ligue agora!</span>`:`<span class="badge b-grn" style="margin-bottom:14px;display:inline-flex">✅ Agendado</span>`}
          ${podEdit?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid #F0F0F0"><button class="btn btn-red btn-full" onclick="openModal('follow')">📅 Reagendar</button></div>`:""}
        </div>`
      :`<div style="text-align:center;padding:32px;color:#A1A1AA">
          <div style="font-size:36px">📅</div>
          <div style="margin-top:8px;margin-bottom:16px">Nenhum follow-up agendado</div>
          ${podEdit?`<button class="btn btn-pur" onclick="openModal('follow')">📅 Agendar Agora</button>`:""}
        </div>`}`;
    }
  } else {
    // Jornada com histórico por etapa
    const etapas = [
      {nome:"📥 Lead Captado",     cor:"#2563EB", done:true,
       obs: l.obsEtapa?.captado||"", key:"captado"},
      {nome:"📤 Distribuído",      cor:"#7C3AED", done:l.distribuidoPor!=null,
       obs: l.obsEtapa?.distribuido||"", key:"distribuido"},
      {nome:"📞 1º Contato",       cor:"#D97706", done:l.tentativas>0,
       obs: l.obsEtapa?.contato||"", key:"contato"},
      {nome:"🔍 Qualificação",     cor:"#F59E0B", done:["Lead qualificado","Visita agendada","Orçamento enviado","Negociação","Venda fechada"].includes(l.status),
       obs: l.obsEtapa?.qualificacao||"", key:"qualificacao"},
      {nome:"🏠 Visita",           cor:"#8B5CF6", done:l.visitou,
       obs: l.obsEtapa?.visita||"", key:"visita"},
      {nome:"📋 Orçamento",        cor:"#EA580C", done:["Orçamento enviado","Negociação","Venda fechada"].includes(l.status),
       obs: l.obsEtapa?.orcamento||"", key:"orcamento"},
      {nome:"🤝 Negociação",       cor:"#C41E3A", done:["Negociação","Venda fechada"].includes(l.status),
       obs: l.obsEtapa?.negociacao||"", key:"negociacao"},
      {nome:"✅ Fechamento",       cor:"#16A34A", done:l.status==="Venda fechada",
       obs: l.obsEtapa?.fechamento||"", key:"fechamento"},
    ];
    const etapaAtual = etapas.filter(e=>e.done).length;
    const pctJornada = Math.round((etapaAtual/etapas.length)*100);

    tabContent=`<div>
    <!-- Barra de progresso da jornada -->
    <div class="card" style="padding:14px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:10px;font-weight:700;text-transform:uppercase;color:#A1A1AA">Progresso da Jornada ${diasInfo}</span>
        <span style="font-size:12px;font-weight:700;color:#18181B">${etapaAtual}/${etapas.length} etapas</span>
      </div>
      <div style="height:8px;background:#F0F0F0;border-radius:4px;overflow:hidden;margin-bottom:10px">
        <div style="height:100%;width:${pctJornada}%;background:linear-gradient(90deg,#2563EB,#16A34A);border-radius:4px"></div>
      </div>
      ${etapas.map((e,i)=>`
      <div style="display:flex;gap:10px;margin-bottom:${i<etapas.length-1?10:0}px;align-items:flex-start">
        <div style="flex-shrink:0;margin-top:2px">
          <div style="width:22px;height:22px;border-radius:50%;background:${e.done?e.cor:"#E4E4E7"};display:flex;align-items:center;justify-content:center">
            <span style="color:#fff;font-size:10px;font-weight:700">${e.done?"✓":i+1}</span>
          </div>
          ${i<etapas.length-1?`<div style="width:2px;height:10px;background:${e.done?"#E4E4E7":"#F0F0F0"};margin:2px auto"></div>`:""}
        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
            <span style="font-size:13px;font-weight:600;color:${e.done?"#18181B":"#A1A1AA"}">${e.nome}</span>
            ${e.done&&podEdit?`<button onclick="abrirModalObsEtapa('${e.key}','${e.nome.replace(/'/g,"\'")}',${l.id})" style="background:none;border:1px solid #E4E4E7;border-radius:6px;padding:2px 8px;font-size:10px;cursor:pointer;color:#52525B;white-space:nowrap">${e.obs?"✏️":"+ obs"}</button>`:""}
          </div>
          ${e.obs?`<div style="font-size:11px;color:#52525B;background:#F7F7F8;padding:5px 8px;border-radius:6px;margin-top:4px">${e.obs}</div>`:""}
          ${!e.done&&i===etapaAtual?`<div style="font-size:10px;color:${e.cor};font-weight:600;margin-top:2px">← Etapa atual</div>`:""}
        </div>
      </div>`).join("")}
    </div>
    ${podEdit?`<div class="card" style="padding:14px">
      <div class="sec-title">Avançar Jornada</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${!l.respondeu?`<button class="btn btn-blu" onclick="marcarRespondeu(${l.id})">✅ Respondeu</button>`:""}
        ${!l.visitou?`<button class="btn btn-blu" onclick="marcarVisitou(${l.id})">🏠 Fez visita</button>`:""}
        ${!["Venda fechada","Venda perdida"].includes(l.status)?`<button class="btn btn-grn" onclick="openModal('fechado')">💰 Registrar Venda</button>`:""}
      </div>
    </div>`:""}
    </div>`;
  }

  return`<div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <button class="btn" onclick="back()">← Voltar</button>
    <div style="flex:1;overflow:hidden">
      <div style="font-family:Georgia,serif;font-size:17px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.nome}</div>
      <div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap">${prioBdg(l.prio)} ${stsBdg(l.status)}
        ${l.vid?`<span class="badge b-blu">👤 ${v?.nome||""}</span>`:podeVerTudo()?`<span class="badge b-pur">⏳ Não distribuído</span>`:""}
      </div>
    </div>
  </div>
  ${l.status==="Venda fechada"?`<div style="background:#DCFCE7;border:1px solid #86EFAC;border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#16A34A;margin-bottom:4px">💰 Valor da Venda Fechada</div>
    <div style="font-family:Georgia,serif;font-size:26px;font-weight:700;color:#16A34A">${l.valorVenda?fmtM(l.valorVenda):"Não informado"}</div>
    ${l.dataFechamento?`<div style="font-size:11px;color:#16A34A;margin-top:2px">📅 Fechada em ${fmtD(l.dataFechamento)}</div>`:""}</div>
    ${podEdit?`<button class="btn btn-grn" style="font-size:11px;flex-shrink:0" onclick="openModal('fechado')">✏️ Editar</button>`:""}
  </div>`:""}
  ${podEdit?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
    <button class="btn" onclick="openModal('histo')">📋 Contato</button>
    <button class="btn" onclick="openModal('follow')">📅 Follow-up</button>
    <button class="btn" onclick="openModal('status')">🔄 Status</button>
    <a href="${gerarLinkWhatsApp(l)}" target="_blank" class="btn" style="background:#25D366;color:#fff">📱 WhatsApp</a>
    <button class="btn btn-grn" onclick="openModal('fechado')">✅ Registrar Venda</button>
    <button class="btn btn-red" onclick="openModal('perdido')">❌ Perdido</button>
  </div>`:`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
    <a href="${gerarLinkWhatsApp(l)}" target="_blank" class="btn" style="background:#25D366;color:#fff">📱 WhatsApp</a>
    <span class="badge b-gray" style="padding:8px 12px;font-size:12px">👁️ Somente visualização</span>
  </div>`}
  <div class="tabs">
    ${[["info","Dados"],["jornada","Jornada"],["followup","Follow-up"],["historico","Histórico"]].map(([t,lbl])=>`<button class="tab ${tab===t?"active":""}" onclick="S.detailTab='${t}';rerenderContent()">${lbl}</button>`).join("")}
  </div>${tabContent}</div>`;
}

// ─── RELATÓRIOS ───────────────────────────────────────────────────────────────
function buildRelatorios(){
  const leads=S.leads, fech=leads.filter(l=>l.status==="Venda fechada"&&l.dataFechamento);
  const perd=leads.filter(l=>l.status==="Venda perdida");
  const valTotal=fech.reduce((a,l)=>a+(parseFloat(l.valorVenda)||0),0);
  const ticket=fech.length?valTotal/fech.length:0;
  const pct=(n,d)=>d>0?((n/d)*100).toFixed(0)+"%":"0%";
  const tab=S.relTab||"mensal", ano=2025;
  const porMes=MESES.map((_,mi)=>{
    const lf=fech.filter(l=>{const d=new Date(l.dataFechamento+"T12:00:00");return d.getFullYear()===ano&&d.getMonth()===mi;});
    const le=leads.filter(l=>{const d=new Date(l.entrada+"T12:00:00");return d.getFullYear()===ano&&d.getMonth()===mi;});
    return{qtd:lf.length,val:lf.reduce((a,l)=>a+(parseFloat(l.valorVenda)||0),0),ent:le.length};
  });
  const maxQ=Math.max(...porMes.map(m=>m.qtd),1), maxV=Math.max(...porMes.map(m=>m.val),1);
  const acum=porMes.map((_,i)=>porMes.slice(0,i+1).reduce((a,m)=>a+m.val,0));
  const maxAcum=Math.max(...acum,1);
  const comJornada=fech.filter(l=>l.entrada&&l.dataFechamento);
  const tempos=comJornada.map(l=>Math.round((new Date(l.dataFechamento+"T12:00:00")-new Date(l.entrada+"T12:00:00"))/(1000*60*60*24)));
  const tempoMedio=tempos.length?Math.round(tempos.reduce((a,b)=>a+b,0)/tempos.length):0;

  const isAnalista = ["gestor","agencia"].includes(S.user?.role);
  const tabsHtml=`<div class="tabs"><button class="tab ${tab==="mensal"?"active":""}" onclick="S.relTab='mensal';rerenderContent()">📅 Por Mês</button><button class="tab ${tab==="jornada"?"active":""}" onclick="S.relTab='jornada';rerenderContent()">🗺️ Jornada</button><button class="tab ${tab==="anual"?"active":""}" onclick="S.relTab='anual';rerenderContent()">📊 Acumulado</button><button class="tab ${tab==="vendedores"?"active":""}" onclick="S.relTab='vendedores';rerenderContent()">👥 Vendedores</button>${isAnalista?`<button class="tab ${tab==="aproveitamento"?"active":""}" onclick="S.relTab='aproveitamento';rerenderContent()">🔍 Aproveitamento</button>`:""}</div>`;
  const metricsTop=`<div class="metrics">
    <div class="mc"><div class="mc-bar" style="background:#2563EB"></div><div class="ml">Total Leads</div><div class="mv" style="color:#2563EB">${leads.length}</div></div>
    <div class="mc"><div class="mc-bar" style="background:#16A34A"></div><div class="ml">Fechadas</div><div class="mv" style="color:#16A34A">${fech.length}</div></div>
    <div class="mc"><div class="mc-bar" style="background:#C41E3A"></div><div class="ml">Perdidos</div><div class="mv" style="color:#C41E3A">${perd.length}</div></div>
    <div class="mc"><div class="mc-bar" style="background:#16A34A"></div><div class="ml">Valor Total</div><div class="mv" style="color:#16A34A;font-size:15px">${valTotal>0?fmtM(valTotal):"—"}</div></div>
    <div class="mc"><div class="mc-bar" style="background:#D97706"></div><div class="ml">Ticket Médio</div><div class="mv" style="color:#D97706;font-size:15px">${ticket>0?fmtM(ticket):"—"}</div></div>
    <div class="mc"><div class="mc-bar" style="background:#16A34A"></div><div class="ml">Conversão</div><div class="mv" style="color:#16A34A">${pct(fech.length,leads.length)}</div></div>
  </div>`;

  if(tab==="mensal")return metricsTop+tabsHtml+`
    <div class="card" style="margin-bottom:14px;padding:16px">
      <div class="sec-title">Fechamentos por mês — ${ano}</div>
      <div class="month-chart">${porMes.slice(0,6).map((m,i)=>`<div class="month-bar-wrap"><div class="month-bar-cont"><div class="month-bar" style="background:${m.qtd>0?"#C41E3A":"#E4E4E7"};height:${Math.round((m.qtd/maxQ)*54)+4}px"></div></div><div class="month-label">${MESES[i]}</div><div class="month-val" style="color:${m.qtd>0?"#C41E3A":"#A1A1AA"}">${m.qtd||"—"}</div></div>`).join("")}</div>
      <div style="height:1px;background:var(--bdr);margin:12px 0"></div>
      <div class="month-chart">${porMes.slice(6).map((m,i)=>`<div class="month-bar-wrap"><div class="month-bar-cont"><div class="month-bar" style="background:${m.qtd>0?"#C41E3A":"#E4E4E7"};height:${Math.round((m.qtd/maxQ)*54)+4}px"></div></div><div class="month-label">${MESES[i+6]}</div><div class="month-val" style="color:${m.qtd>0?"#C41E3A":"#A1A1AA"}">${m.qtd||"—"}</div></div>`).join("")}</div>
    </div>
    <div class="card" style="padding:16px">
      <div class="sec-title">Entradas vs Fechamentos — ${ano}</div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:360px">
        <thead><tr style="background:#F7F7F8"><th style="padding:8px;text-align:left;font-size:10px;color:#A1A1AA;text-transform:uppercase;font-weight:700">Mês</th><th style="padding:8px;text-align:center;font-size:10px;color:#A1A1AA;text-transform:uppercase;font-weight:700">Entradas</th><th style="padding:8px;text-align:center;font-size:10px;color:#A1A1AA;text-transform:uppercase;font-weight:700">Fechamentos</th><th style="padding:8px;text-align:right;font-size:10px;color:#A1A1AA;text-transform:uppercase;font-weight:700">Valor</th></tr></thead>
        <tbody>${MESES.map((m,i)=>{const d=porMes[i];return`<tr style="border-bottom:1px solid #F4F4F5"><td style="padding:8px;font-weight:500">${MESES_FULL[i]}</td><td style="padding:8px;text-align:center;color:#2563EB;font-weight:${d.ent>0?600:400}">${d.ent||"—"}</td><td style="padding:8px;text-align:center;color:#16A34A;font-weight:${d.qtd>0?700:400}">${d.qtd||"—"}</td><td style="padding:8px;text-align:right;color:#16A34A;font-weight:${d.val>0?600:400}">${d.val>0?fmtM(d.val):"—"}</td></tr>`;}).join("")}</tbody>
      </table></div>
    </div>`;

  if(tab==="jornada")return metricsTop+tabsHtml+`
    <div class="g3"><div class="mc"><div class="mc-bar" style="background:#2563EB"></div><div class="ml">Tempo Médio</div><div class="mv" style="color:#2563EB">${tempoMedio}d</div><div class="ms">entrada→fechamento</div></div>
    <div class="mc"><div class="mc-bar" style="background:#16A34A"></div><div class="ml">Mais Rápido</div><div class="mv" style="color:#16A34A">${tempos.length?Math.min(...tempos):0}d</div></div>
    <div class="mc"><div class="mc-bar" style="background:#C41E3A"></div><div class="ml">Mais Longo</div><div class="mv" style="color:#C41E3A">${tempos.length?Math.max(...tempos):0}d</div></div></div>
    <div class="card" style="padding:16px">
      <div class="sec-title">Jornada por cliente</div>
      ${comJornada.map(l=>{const e=new Date(l.entrada+"T12:00:00"),f=new Date(l.dataFechamento+"T12:00:00"),dias=Math.round((f-e)/(1000*60*60*24)),v=S.users.find(x=>x.id===l.vid);return`<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #F4F4F5;flex-wrap:wrap">
        <div style="flex:1;min-width:100px"><div style="font-weight:600;font-size:13px">${l.nome}</div><div style="font-size:11px;color:#A1A1AA">${v?.nome||""} · ${l.interesse}</div></div>
        <div style="text-align:center;min-width:44px"><div style="font-size:10px;color:#A1A1AA">Entrada</div><div style="font-size:12px;font-weight:600">${MESES[e.getMonth()]}</div></div>
        <div style="color:#A1A1AA">→</div>
        <div style="text-align:center;min-width:50px"><div style="font-size:10px;color:#A1A1AA">Fechou</div><div style="font-size:12px;font-weight:600;color:#16A34A">${MESES[f.getMonth()]}</div></div>
        <span class="badge b-blu" style="min-width:46px;justify-content:center">${dias}d</span>
        <div style="font-weight:700;font-size:12px;color:#16A34A;min-width:76px;text-align:right">${fmtM(l.valorVenda)}</div>
      </div>`;}).join("")||`<div style="text-align:center;padding:24px;color:#A1A1AA">Nenhum fechamento registrado</div>`}
    </div>`;

  if(tab==="anual")return metricsTop+tabsHtml+`
    <div class="card" style="padding:16px;margin-bottom:14px">
      <div class="sec-title">Acumulado ${ano}</div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:320px">
        <thead><tr style="background:#F7F7F8"><th style="padding:8px;text-align:left;font-size:10px;color:#A1A1AA;text-transform:uppercase;font-weight:700">Mês</th><th style="padding:8px;text-align:center;font-size:10px;color:#A1A1AA;text-transform:uppercase;font-weight:700">Vendas</th><th style="padding:8px;text-align:right;font-size:10px;color:#A1A1AA;text-transform:uppercase;font-weight:700">Mês</th><th style="padding:8px;text-align:right;font-size:10px;color:#A1A1AA;text-transform:uppercase;font-weight:700">Acumulado</th></tr></thead>
        <tbody>${MESES.map((m,i)=>{const d=porMes[i],ac=acum[i];return`<tr style="border-bottom:1px solid #F4F4F5"><td style="padding:8px;font-weight:500">${MESES_FULL[i]}</td><td style="padding:8px;text-align:center;color:#16A34A;font-weight:${d.qtd>0?700:400}">${d.qtd||"—"}</td><td style="padding:8px;text-align:right;color:#16A34A;font-weight:${d.val>0?600:400}">${d.val>0?fmtM(d.val):"—"}</td><td style="padding:8px;text-align:right;font-weight:700;color:${ac>0?"#2563EB":"#A1A1AA"}">${ac>0?fmtM(ac):"—"}</td></tr>`;}).join("")}
        <tr style="background:#F7F7F8;border-top:2px solid var(--bdr)"><td style="padding:8px;font-weight:700">TOTAL ANUAL</td><td style="padding:8px;text-align:center;font-weight:700;color:#16A34A">${fech.length}</td><td style="padding:8px;text-align:right;font-weight:700;color:#16A34A">${fmtM(valTotal)}</td><td style="padding:8px;text-align:right;font-weight:700;color:#2563EB">${fmtM(valTotal)}</td></tr>
        </tbody></table></div>
    </div>
    <div class="card" style="padding:16px"><div class="sec-title">Evolução acumulada</div>
      ${acum.filter(v=>v>0).length===0?`<div style="text-align:center;padding:16px;color:#A1A1AA">Sem dados</div>`:
      acum.map((ac,i)=>ac>0?`<div class="bar-row"><div style="font-size:11px;color:#52525B;flex-shrink:0;text-align:right;width:35px">${MESES[i]}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round((ac/maxAcum)*100)}%;background:#2563EB"></div></div><div style="font-size:11px;font-weight:600;color:#2563EB;width:80px">${fmtM(ac)}</div></div>`:""
      ).join("")}
    </div>`;

  // APROVEITAMENTO (só gestor e agência)
  if(tab==="aproveitamento"){
    const mesA = new Date().getMonth(), anoA = new Date().getFullYear();
    const nomeMesA = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][mesA];
    const leadsMes = leads.filter(l=>{const d=new Date(l.entrada+"T12:00:00");return d.getMonth()===mesA&&d.getFullYear()===anoA;});
    const fechMes  = leadsMes.filter(l=>l.status==="Venda fechada");
    const perdMes  = leadsMes.filter(l=>l.status==="Venda perdida");
    const negMes   = leadsMes.filter(l=>["Negociação","Orçamento enviado","Visita agendada","Lead qualificado","Em atendimento"].includes(l.status));
    const distMes  = leadsMes.filter(l=>l.distribuidoPor!=null);
    const naoDistMes = leadsMes.filter(l=>!l.distribuidoPor);
    const desperdicadosMes = perdMes.filter(l=>(l.tentativas||0)<3);
    const pctAprov = distMes.length>0 ? ((fechMes.length/distMes.length)*100).toFixed(0) : 0;
    const pctDesp  = perdMes.length>0 ? ((desperdicadosMes.length/perdMes.length)*100).toFixed(0) : 0;

    // Por vendedor
    const analVend = vendedoresAtivos().map(v=>{
      const vl = leadsMes.filter(l=>l.vid===v.id);
      const vf = vl.filter(l=>l.status==="Venda fechada");
      const vp = vl.filter(l=>l.status==="Venda perdida");
      const vd = vp.filter(l=>(l.tentativas||0)<3);
      const vn = vl.filter(l=>["Negociação","Orçamento enviado","Visita agendada","Lead qualificado","Em atendimento"].includes(l.status));
      return{v,vl,vf,vp,vd,vn};
    });

    return metricsTop+tabsHtml+`
    <div style="margin-bottom:16px">
      <div style="font-size:16px;font-weight:700">🔍 Análise de Aproveitamento</div>
      <div style="font-size:12px;color:#A1A1AA">${nomeMesA} ${anoA}</div>
    </div>

    <!-- Cards resumo -->
    <div class="metrics" style="margin-bottom:14px">
      <div class="mc"><div class="mc-bar" style="background:#2563EB"></div><div class="ml">Leads no Mês</div><div class="mv" style="color:#2563EB">${leadsMes.length}</div><div class="ms">${distMes.length} distribuídos</div></div>
      <div class="mc"><div class="mc-bar" style="background:#16A34A"></div><div class="ml">Fechados</div><div class="mv" style="color:#16A34A">${fechMes.length}</div><div class="ms">${pctAprov}% de conversão</div></div>
      <div class="mc"><div class="mc-bar" style="background:#D97706"></div><div class="ml">Em Negociação</div><div class="mv" style="color:#D97706">${negMes.length}</div><div class="ms">oportunidades abertas</div></div>
      <div class="mc"><div class="mc-bar" style="background:#C41E3A"></div><div class="ml">Perdidos</div><div class="mv" style="color:#C41E3A">${perdMes.length}</div><div class="ms">${desperdicadosMes.length} c/ menos de 3 contatos</div></div>
    </div>

    <!-- Alerta de leads desperdiçados -->
    ${desperdicadosMes.length>0?`<div class="alert al-red" style="margin-bottom:14px">
      ⚠️ <strong>${desperdicadosMes.length} lead(s) descartado(s) com menos de 3 contatos</strong> — ${pctDesp}% dos leads perdidos foram desperdiçados sem esforço suficiente.
    </div>`:""}

    <!-- Funil do mês -->
    <div class="card" style="padding:16px;margin-bottom:14px">
      <div class="sec-title">Funil de Vendas — ${nomeMesA}</div>
      ${[
        {l:"Leads Recebidos", n:leadsMes.length, c:"#2563EB"},
        {l:"Distribuídos", n:distMes.length, c:"#7C3AED"},
        {l:"Em Negociação / Ativos", n:negMes.length, c:"#D97706"},
        {l:"Fechados", n:fechMes.length, c:"#16A34A"},
        {l:"Perdidos", n:perdMes.length, c:"#C41E3A"},
        {l:"⚠️ Desperdiçados (< 3 contatos)", n:desperdicadosMes.length, c:"#991B1B"},
      ].map(row=>`<div class="bar-row" style="margin-bottom:10px">
        <div style="font-size:12px;color:#52525B;width:200px;flex-shrink:0">${row.l}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${leadsMes.length>0?Math.round((row.n/leadsMes.length)*100):0}%;background:${row.c}"></div></div>
        <div style="font-size:12px;font-weight:700;color:${row.c};width:40px;text-align:right">${row.n}</div>
      </div>`).join("")}
    </div>

    <!-- Por vendedor -->
    <div class="card" style="padding:0">
      <div style="padding:12px 14px 4px"><span class="sec-title">Por Vendedor — ${nomeMesA}</span></div>
      ${analVend.map((d,i,arr)=>`<div style="padding:12px 14px;border-bottom:${i<arr.length-1?"1px solid #F4F4F5":"none"}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center">${d.v.av}</div>
          <div style="font-weight:600">${d.v.nome}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center">
          <div><div style="font-size:18px;font-weight:700;color:#2563EB">${d.vl.length}</div><div style="font-size:10px;color:#A1A1AA">recebidos</div></div>
          <div><div style="font-size:18px;font-weight:700;color:#16A34A">${d.vf.length}</div><div style="font-size:10px;color:#A1A1AA">fechados</div></div>
          <div><div style="font-size:18px;font-weight:700;color:#D97706">${d.vn.length}</div><div style="font-size:10px;color:#A1A1AA">em aberto</div></div>
          <div><div style="font-size:18px;font-weight:700;color:#C41E3A">${d.vd.length}</div><div style="font-size:10px;color:#A1A1AA">desperdiç.</div></div>
        </div>
        ${d.vd.length>0?`<div style="margin-top:8px;font-size:11px;color:#C41E3A">⚠️ ${d.vd.length} lead(s) descartado(s) com menos de 3 contatos</div>`:""}
      </div>`).join("")}
    </div>`;
  }

  // VENDEDORES
  return metricsTop+tabsHtml+`<div class="card">
    <div style="padding:12px 14px 4px"><span class="sec-title">Desempenho por Vendedor</span></div>
    ${vendedoresAtivos().map((v,i,arr)=>{
      const ml=leads.filter(l=>l.vid===v.id), mf=ml.filter(l=>l.status==="Venda fechada");
      const vl=mf.reduce((a,l)=>a+(parseFloat(l.valorVenda)||0),0);
      const t=ml.length>0?((mf.length/ml.length)*100).toFixed(0):0;
      const tmP=mf.filter(l=>l.entrada&&l.dataFechamento).map(l=>Math.round((new Date(l.dataFechamento+"T12:00:00")-new Date(l.entrada+"T12:00:00"))/(1000*60*60*24)));
      const tmM=tmP.length?Math.round(tmP.reduce((a,b)=>a+b,0)/tmP.length):null;
      const carga=calcCarga(v.id);
      return`<div style="padding:12px 14px;border-bottom:${i<arr.length-1?"1px solid #F4F4F5":"none"}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${v.av}</div>
          <div style="flex:1"><div style="font-weight:600;font-size:13px">${v.nome}</div>
          <div style="font-size:11px;color:#A1A1AA">${ml.length} leads · ${mf.length} vendas · ${vl>0?fmtM(vl):"R$ 0,00"}${tmM?` · ⏱ ${tmM}d médio`:""} · carga: <span style="color:${cargaCor(carga)};font-weight:600">${cargaLabel(carga)}</span></div></div>
          <span class="badge b-grn">${t}%</span>
        </div>
        <div style="height:6px;background:#F0F0F0;border-radius:3px;overflow:hidden"><div style="height:100%;width:${t}%;background:#16A34A;border-radius:3px"></div></div>
      </div>`;
    }).join("")}
  </div>`;
}

    body=`<div class="fg"><label class="fl">Novo Status</label><select class="fc" id="m-status">${STATUS_L.map(s=>`<option value="${s}" ${l?.status===s?"selected":""}>${s}</option>`).join("")}</select></div>`;

window.doPerdido=function(){
  const motivo=document.getElementById("m-motivo")?.value||"";
  const outro=document.getElementById("m-outro")?.value||"";
  if(!motivo)return alert("Selecione o motivo");
  if(motivo==="Outro motivo"&&!outro)return alert("Descreva o motivo");
  const nContatos=(S.sel?.tentativas||0);
  const hist=S.sel?.hist||[];
  const primeiroTs=hist.length>0?hist[0].ts:null;
  const diasDecorridos=primeiroTs?Math.round((Date.now()-primeiroTs)/(1000*60*60*24)):0;
  if(nContatos<4){
    if(!confirm("⚠️ Atenção!\n\nEste lead tem apenas "+nContatos+" contato(s) registrado(s).\n\nA política da Italínea exige pelo menos 4 tentativas antes de descartar.\n\nDeseja descartar mesmo assim?"))return;
  } else if(diasDecorridos<5){
    if(!confirm("⚠️ Atenção!\n\nEste lead está sendo trabalhado há apenas "+diasDecorridos+" dia(s).\n\nA política exige pelo menos 5 dias de tentativas antes de descartar.\n\nDeseja descartar mesmo assim?"))return;
  }
  const upd=prep({...S.sel,status:"Venda perdida",motivo:motivo==="Outro motivo"?outro:motivo});
  S.leads=S.leads.map(x=>x.id===S.sel.id?upd:x);
  S.sel=upd; S.modal=null; fecharModalNativo(); toast("❌ Venda perdida registrada","red"); salvarDados(); rerenderContent();
};
window.doHisto=function(){
  const tipo=document.getElementById("m-tipo")?.value||"WhatsApp";
  const respondeu=document.getElementById("m-respondeu")?.value||"nao";
  const obs=document.getElementById("m-hobs")?.value||"";
  if(!obs&&respondeu==="nao"){}// obs opcional se não respondeu
  const v=S.users.find(x=>x.id===S.sel.vid);
  const agora=new Date();
  const resultado=respondeu==="sim"?"Cliente respondeu":"Sem resposta";
  const n={data:today(),hora:agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),ts:agora.getTime(),vendedor:v?.nome||S.user.nome,tipo,resultado,obs,respondeu:respondeu==="sim"};
  const novasTentativas=(S.sel.tentativas||0)+1;

  // Verificar intervalos mínimos
  const hist=S.sel.hist||[];
  const ultimoContato=hist.length>0?hist[hist.length-1]:null;
  let avisoIntervalo="";
  if(ultimoContato&&ultimoContato.ts){
    const diffMs=agora.getTime()-ultimoContato.ts;
    const diffH=diffMs/(1000*60*60);
    const diffD=diffMs/(1000*60*60*24);
    if(novasTentativas===2&&diffH<4){
      avisoIntervalo="⚠️ 2º contato idealmente com 4h de intervalo. Registrado mesmo assim.";
    } else if(novasTentativas===3&&diffD<1){
      avisoIntervalo="⚠️ 3º contato idealmente no dia seguinte. Registrado mesmo assim.";
    } else if(novasTentativas===4&&diffD<3){
      avisoIntervalo="⚠️ 4º contato idealmente após 3 dias. Registrado mesmo assim.";
    }
    if(avisoIntervalo) toast(avisoIntervalo,"amb");
  }

  // Status automático baseado na resposta
  let novoStatus=S.sel.status;
  if(respondeu==="sim"){
    if(S.sel.status==="Novo lead"||S.sel.status==="Sem resposta"||S.sel.status==="Contato pendente")
      novoStatus="Em atendimento";
  } else {
    if(S.sel.status==="Novo lead"||S.sel.status==="Contato pendente")
      novoStatus="Sem resposta";
  }

  // Follow-up automático se não respondeu
  let novoFollow=S.sel.follow;
  if(respondeu==="nao"){
    const proxData=new Date(agora);
    if(novasTentativas===1) proxData.setHours(proxData.getHours()+4);
    else if(novasTentativas===2) proxData.setDate(proxData.getDate()+1);
    else if(novasTentativas===3) proxData.setDate(proxData.getDate()+2);
    else if(novasTentativas>=4) proxData.setDate(proxData.getDate()+2);
    novoFollow=proxData.toISOString().split("T")[0];
  }

  const upd=prep({...S.sel,hist:[...hist,n],tentativas:novasTentativas,
    respondeu:S.sel.respondeu||(respondeu==="sim"),status:novoStatus,follow:novoFollow});
  S.leads=S.leads.map(x=>x.id===S.sel.id?upd:x);
  S.sel=upd; S.modal=null; fecharModalNativo(); salvarDados();
  if(!avisoIntervalo) toast("📋 Contato registrado","grn");

  // Se respondeu, perguntar se quer avançar etapa
  if(respondeu==="sim"){
    setTimeout(()=>perguntarAvancarEtapa(upd),300);
  } else {
    // Sem resposta: perguntar se quer agendar próximo contato
    setTimeout(()=>perguntarAgendarFollowup(upd, novoFollow, novasTentativas),300);
  }
};

window.importarSheets=async function(){
  if(!S.sheetsUrl){alert("Configure a URL da planilha primeiro.");return;}
  const btn=document.getElementById("btn-import");
  if(btn){btn.textContent="⏳ Importando...";btn.disabled=true;}
  try{
    // Tenta buscar a planilha pública como CSV
    // Na versão online com backend, isto será um job agendado
    const resp=await fetch(S.sheetsUrl);
    if(!resp.ok)throw new Error("Não foi possível acessar a planilha. Verifique se ela está publicada como pública.");
    const csv=await resp.text();
    const rows=csv.split("\n").map(r=>r.split(",").map(c=>c.replace(/^"|"$/g,"").trim()));
    if(rows.length<2)throw new Error("Planilha vazia ou sem dados.");
    const headers=rows[0].map(h=>h.toLowerCase());
    const getCol=(colName)=>{const idx=headers.indexOf(colName.toLowerCase());return idx>=0?idx:-1;};
    const map=S.sheetsMapeamento;
    let importados=0, duplicados=0, erros=0;
    const telExistentes=new Set(S.leads.map(l=>l.tel.replace(/\D/g,"")));
    for(let i=1;i<rows.length;i++){
      const r=rows[i]; if(r.length<2||!r[0])continue;
      const tel=(getCol(map.telefone)>=0?r[getCol(map.telefone)]:"").replace(/\D/g,"");
      if(!tel||telExistentes.has(tel)){duplicados++;continue;}
      try{
        const nome=getCol(map.nome)>=0?r[getCol(map.nome)]:"Lead importado";
        const nl=prep({id:Date.now()+i,nome,tel,email:getCol(map.email)>=0?r[getCol(map.email)]:"",entrada:today(),origem:getCol(map.origem)>=0?r[getCol(map.origem)]:"Instagram",campanha:"Google Sheets",interesse:getCol(map.interesse)>=0?r[getCol(map.interesse)]||"Cozinha":"Cozinha",orc:getCol(map.orc)>=0?r[getCol(map.orc)]:"",prazo:getCol(map.prazo)>=0?r[getCol(map.prazo)]||"Até 3 meses":"Até 3 meses",imovel:"Não informado",vid:null,distribuidoPor:null,dataDistrib:null,status:"Novo lead",tentativas:0,hist:[],respondeu:false,visitou:false,follow:null,obs:"Importado via Google Sheets",valorVenda:null,dataFechamento:null});
        S.leads.unshift(nl); telExistentes.add(tel); importados++;
      }catch(e){erros++;}
    }
    const dataHora=new Date().toLocaleString("pt-BR");
    S.lastImport=dataHora;
    S.importLog.push({ok:true,msg:`${importados} lead(s) importado(s). ${duplicados} duplicado(s) ignorado(s).${erros>0?` ${erros} erro(s).`:""}`,data:dataHora});
    toast(`✅ ${importados} lead(s) importado(s)!`,"grn");
  }catch(e){
    const dataHora=new Date().toLocaleString("pt-BR");
    S.importLog.push({ok:false,msg:`Erro: ${e.message}`,data:dataHora});
    alert(`Erro ao importar: ${e.message}\n\nDica: A planilha precisa estar publicada como pública no Google Sheets (Arquivo → Publicar na web → CSV).`);
  }
  rerenderContent();
  salvarDados();
};

  abrirModalNativo(
    '✏️ Observações',
    '<div style="margin-bottom:8px"><label style="font-size:11px;font-weight:600;color:#A1A1AA;text-transform:uppercase">Observações do Lead</label><textarea id="obs-txt" style="width:100%;margin-top:6px;padding:9px 12px;border:1.5px solid #E4E4E7;border-radius:8px;font-size:13px;font-family:inherit;min-height:120px;resize:vertical;outline:none;box-sizing:border-box">'+obsAtual+'</textarea></div>',
    '<button onclick="fecharModalNativo()" style="flex:1;padding:10px;border-radius:8px;border:none;background:#F0F0F0;cursor:pointer;font-size:13px;font-weight:500">Cancelar</button><button onclick="salvarObsNativo()" style="flex:1;padding:10px;border-radius:8px;border:none;background:#2563EB;color:#fff;cursor:pointer;font-size:13px;font-weight:600">💾 Salvar</button>'
  );
};

window.salvarObsNativo = function() {
  const txt = document.getElementById('obs-txt');
  if(!txt || !S.sel) return;
  const obs = txt.value;
  const upd = {...S.sel, obs};
  S.leads = S.leads.map(x => x.id === S.sel.id ? upd : x);
  S.sel = upd;
  fecharModalNativo();
  salvarDados();
  toast('✅ Observação salva', 'blu');
  // Atualiza só o bloco de obs sem rerenderContent completo
  const obsEl = document.getElementById('obs-display');
  if(obsEl) {
    obsEl.innerHTML = obs
      ? '<div style="background:#F7F7F8;padding:9px 11px;border-radius:8px;font-size:13px">'+obs+'</div><button class="btn btn-blu" style="margin-top:8px;font-size:11px" onclick="abrirModalObs()">✏️ Editar</button>'
      : '<button class="btn" style="margin-top:12px;font-size:11px" onclick="abrirModalObs()">✏️ Adicionar observação</button>';
  } else {
    rerenderContent();
  }
};


window.abrirModalMeta = function() {
  abrirModalNativo(
    '🎯 Definir Meta Mensal',
    `<div class="fg">
       <label class="fl">Meta de Vendas em R$ (mês atual)</label>
       <input type="number" class="fc" id="meta-val" value="${S.metaMensal||""}" placeholder="Ex: 150000" style="font-size:16px">
       <div style="font-size:11px;color:#A1A1AA;margin-top:4px">Digite o valor total de vendas que a equipe deve atingir neste mês</div>
     </div>`,
    `<button onclick="fecharModalNativo()" style="flex:1;padding:10px;border-radius:8px;border:none;background:#F0F0F0;cursor:pointer;font-size:13px;font-weight:500">Cancelar</button>
     <button onclick="salvarMeta()" style="flex:1;padding:10px;border-radius:8px;border:none;background:#C41E3A;color:#fff;cursor:pointer;font-size:13px;font-weight:600">💾 Salvar Meta</button>`
  );
};

window.salvarMeta = function() {
  const val = parseFloat(document.getElementById('meta-val')?.value || '0');
  if(isNaN(val) || val < 0) return alert('Digite um valor válido');
  S.metaMensal = val;
  fecharModalNativo();
  salvarDados();
  const nv=vendedoresAtivos().length||1; toast('🎯 Meta da loja: '+fmtM(val)+' ('+fmtM(val/nv)+' por vendedor)', 'grn');
  rerenderContent();
};

// Carrega dados salvos antes de exibir
carregarDados();
render();
</script>
</body>
</html>
